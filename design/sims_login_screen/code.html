<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SIMS Login - Faculty of IT</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b3b5b",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111b21",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen">
<!-- Background Overlay Section -->
<div class="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
<!-- Background Image with Dark Navy Overlay -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Academic campus building exterior at sunset" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCcE1tczeBWkbVZKZthUymY18Te4wXkPDfvvoqOhRIMjhc-jfI8BGUwbo_0P4V8m4NscC_8iSHo7yHAiAQp2YIU7O6YZu2C5SKWQB9lBLBt2UTNXZHWsjF3t0sTdyMeTY9DZQFdjpJmyxKrL95SsbQpD-vO7aIDD6QbmZld5hZvwzQwwAQZtI30w-Sb-vWEPXp8omjJaAlYFDPHihWyUlOkDRJj9VzlAbEpieK8lwOij1R3H5YobYnPlhMxZReiieo09DS3H6i1VOaO');">
<div class="absolute inset-0 bg-primary/80 backdrop-blur-[2px]"></div>
</div>
<!-- Login Card Container -->
<div class="relative z-10 w-full max-w-md px-6">
<div class="bg-white dark:bg-slate-900 shadow-2xl rounded-xl overflow-hidden p-8 md:p-10 border border-white/10">
<!-- Branding / Header -->
<div class="flex flex-col items-center mb-8">
<!-- Placeholder for University Logo -->
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-5xl">school</span>
</div>
<h1 class="text-primary dark:text-white text-3xl font-bold tracking-tight text-center">SIMS</h1>
<p class="text-[#4f7a96] dark:text-slate-400 text-sm font-medium text-center mt-1">Smart Inventory Management System</p>
<p class="text-slate-500 dark:text-slate-500 text-xs font-normal text-center mt-1">Faculty of IT - University of Moratuwa</p>
</div>
<div class="mb-6">
<h2 class="text-[#0e161b] dark:text-white text-xl font-bold leading-tight pb-1">Welcome back</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to sign in.</p>
</div>
<!-- Form Section -->
<form class="space-y-5">
<!-- Email Field -->
<div class="flex flex-col">
<label class="text-[#0e161b] dark:text-slate-200 text-sm font-medium pb-2">Email Address</label>
<div class="flex w-full items-stretch rounded-lg border border-[#d0dee6] dark:border-slate-700 bg-white dark:bg-slate-800 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[#0e161b] dark:text-white placeholder:text-[#4f7a96] p-4 text-sm font-normal" placeholder="e.g., john_doe@uom.lk" type="email"/>
<div class="text-[#4f7a96] flex items-center justify-center pr-4">
<span class="material-symbols-outlined">mail</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col">
<label class="text-[#0e161b] dark:text-slate-200 text-sm font-medium pb-2">Password</label>
<div class="flex w-full items-stretch rounded-lg border border-[#d0dee6] dark:border-slate-700 bg-white dark:bg-slate-800 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-[#0e161b] dark:text-white placeholder:text-[#4f7a96] p-4 text-sm font-normal" placeholder="••••••••" type="password"/>
<div class="text-[#4f7a96] flex items-center justify-center pr-4">
<span class="material-symbols-outlined">lock</span>
</div>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-primary dark:text-blue-400 text-xs font-semibold hover:underline" href="#">Forgot your password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">login</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary dark:text-blue-400 font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Bottom Disclaimer -->
<p class="text-white/60 text-[10px] text-center mt-6 uppercase tracking-widest font-medium">
                © 2024 University of Moratuwa • Faculty of Information Technology
            </p>
</div>
</div>
</body></html>
